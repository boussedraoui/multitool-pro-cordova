<script>
// ===================================================================
// 完全スクリプト – 34個のコアツールのみ保持、全て日本語化
// ===================================================================

let darkMode = localStorage.getItem('theme') === 'dark';
if (darkMode) document.documentElement.setAttribute('data-theme', 'dark');
let muted = localStorage.getItem('soundMuted') === 'true';
let audioCtx = null;
let calcExpr = '';

function showToast(msg) {
    let t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
function playSound() {
    if (muted) return;
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    let osc = audioCtx.createOscillator(),
        gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = 660;
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

document.addEventListener('DOMContentLoaded', function() {
    let muteBtn = document.getElementById('muteBtn');
    if (muted) muteBtn.innerText = '🔇';
    muteBtn.onclick = function() {
        muted = !muted;
        localStorage.setItem('soundMuted', muted);
        this.innerText = muted ? '🔇' : '🔊';
        showToast(muted ? 'ミュートしました' : 'サウンドをオンにしました');
    };
});

function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
function toggleSidebar() {

    document.getElementById('sidebarOverlay').classList.toggle('active');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('active');
    document.getElementById('sidebarOverlay').classList.remove('active');
}
function toggleTheme() {
    darkMode = !darkMode;
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    localStorage.setItem('theme', darkMode ? 'dark' : 'light');
}

let currentStar = 0;
const starBoxes = document.querySelectorAll('.star-box');
const totalStars = starBoxes.length;
function fillNextStar() {
    if (currentStar >= totalStars) return;
    const box = starBoxes[currentStar];
    const starSpan = box.querySelector('.star');
    starSpan.classList.remove('empty');
    starSpan.classList.add('filled');
    starSpan.textContent = '★';
    if (currentStar === totalStars - 1) { triggerFireworks(box); }
    currentStar++;
    if (currentStar < totalStars) { setTimeout(fillNextStar, 400); }
}
function triggerFireworks(starBox) {
    starBox.classList.add('explode');
    const rect = starBox.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    const colors = ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#00ffff', '#0000ff', '#8b00ff', '#ff33cc', '#ff6699'];
    for (let i = 0; i < 60; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 6;
        const dx = Math.cos(angle) * speed * 8;
        const dy = Math.sin(angle) * speed * 8;
        const particle = document.createElement('div');
        particle.className = 'firework-particle';
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.left = centerX + 'px';
        particle.style.top = centerY + 'px';
        particle.style.setProperty('--dx', dx + 'px');
        particle.style.setProperty('--dy', dy + 'px');
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 800);
    }
    setTimeout(() => { starBox.classList.remove('explode'); }, 600);
}
window.addEventListener('load', function() { setTimeout(fillNextStar, 500); });

let calcHistory = [];
function appendCalc(v) {
    if (v === 'C') { calcExpr = ''; } else if (v === 'DEL') { calcExpr = calcExpr.slice(0, -1); } else { calcExpr += v; }
    const display = document.getElementById('calcDisplay');
    if (display) display.textContent = calcExpr || '0';
}
function evalCalc() {
    let expr = calcExpr;
    if (!expr) return;
    try {
        expr = expr.replace(/sin\(/g, 'Math.sin(');
        expr = expr.replace(/cos\(/g, 'Math.cos(');
        expr = expr.replace(/tan\(/g, 'Math.tan(');
        expr = expr.replace(/log\(/g, 'Math.log10(');
        expr = expr.replace(/ln\(/g, 'Math.log(');
        expr = expr.replace(/sqrt\(/g, 'Math.sqrt(');
        expr = expr.replace(/π/g, 'Math.PI');
        expr = expr.replace(/\be\b/g, 'Math.E');
        expr = expr.replace(/\^/g, '**');
        let result = new Function('return ' + expr)();
        calcHistory.unshift(`${calcExpr} = ${result}`);
        if (calcHistory.length > 5) calcHistory.pop();
        document.getElementById('calcHistory').innerHTML = calcHistory.join('<br>');
        document.getElementById('calcResult').innerHTML = '<strong>結果:</strong> ' + result;
        calcExpr = String(result);
        const display = document.getElementById('calcDisplay');
        if (display) display.textContent = result;
    } catch (e) { document.getElementById('calcResult').innerHTML = 'エラー'; }
}

function rgbToHsl(r, g, b) { r /= 255, g /= 255, b /= 255; let max = Math.max(r, g, b),
        min = Math.min(r, g, b); let h, s, l = (max + min) / 2; if (max === min) h = s = 0; else { let d = max - min; s = l > 0.5 ? d / (2 - max - min) : d / (max + min); switch (max) { case r: h = (g - b) / d + (g < b ? 6 : 0); break; case g: h = (b - r) / d + 2; break; case b: h = (r - g) / d + 4; break; } h /= 6; } return [h * 360, s, l]; }

function genRandomAdvanced() {
    let min = parseFloat(document.getElementById('randMin').value);
    let max = parseFloat(document.getElementById('randMax').value);
    let count = parseInt(document.getElementById('randCount').value);
    let dup = document.getElementById('randDuplicates').checked;
    let sort = document.getElementById('randSort').checked;
    let decimals = parseInt(document.getElementById('randDecimals').value);
    if (isNaN(min) || isNaN(max) || min > max) { showToast('無効な範囲'); return; }
    let results = [];
    if (dup) {
        for (let i = 0; i < count; i++) {
            let val = min + Math.random() * (max - min);
            results.push(val.toFixed(decimals));
        }
    } else {
        let step = 1 / Math.pow(10, decimals);
        let possible = Math.floor((max - min) / step) + 1;
        if (count > possible) { showToast('一意の値が不足しています'); return; }
        let set = new Set();
        while (set.size < count) {
            let val = min + Math.random() * (max - min);
            set.add(val.toFixed(decimals));
        }
        results = Array.from(set);
    }
    if (sort) results.sort((a, b) => parseFloat(a) - parseFloat(b));
    document.getElementById('randOut').innerHTML = results.join(', ');
}

function calcAgeAdvanced() {
    let dob = new Date(document.getElementById('dob').value);
    let today = new Date();
    let years = today.getFullYear() - dob.getFullYear();
    let months = today.getMonth() - dob.getMonth();
    let days = today.getDate() - dob.getDate();
    if (days < 0) { months--;
        days += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
    if (months < 0) { years--;
        months += 12; }
    let nextBD = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
    if (nextBD < today) nextBD.setFullYear(nextBD.getFullYear() + 1);
    let daysToNext = Math.ceil((nextBD - today) / 86400000);
    document.getElementById('ageOut').innerHTML = `${years} 年, ${months} 月, ${days} 日。<br>次の誕生日まであと ${daysToNext} 日。`;
}

function convertRomanAdvanced() {
    let input = document.getElementById('romanNum').value.trim().toUpperCase();
    let romanRegex = /^[IVXLCDM]+$/;
    if (romanRegex.test(input)) {
        let num = romanToInt(input);
        if (num >= 1 && num <= 3999) document.getElementById('romanOut').innerHTML = `${input} = ${num}`;
        else document.getElementById('romanOut').innerHTML = '無効なローマ数字';
    } else {
        let num = parseInt(input);
        if (isNaN(num) || num < 1 || num > 3999) { document.getElementById('romanOut').innerHTML = '1-3999の数字またはローマ数字を入力してください'; return; }
        document.getElementById('romanOut').innerHTML = `${num} = ${intToRoman(num)}`;
    }
}
function intToRoman(num) { const map = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 }; let res = ''; for (let key in map) { while (num >= map[key]) { res += key;
        num -= map[key]; } } return res; }
function romanToInt(s) { const map = { I: 1, V: 5, X: 10, L: 50, C: 100, D: 500, M: 1000 }; let total = 0; for (let i = 0; i < s.length; i++) { let curr = map[s[i]],
        next = map[s[i + 1]]; if (next && curr < next) total -= curr; else total += curr; } return total; }

function calcTipAdvanced() {
    let bill = parseFloat(document.getElementById('billAmt').value);
    let tipP = parseFloat(document.getElementById('tipPct').value);
    let split = parseInt(document.getElementById('splitNum').value);
    if (isNaN(bill) || isNaN(tipP)) { showToast('請求額とチップを入力してください'); return; }
    let tip = bill * tipP / 100;
    let total = bill + tip;
    let perPerson = total / split;
    document.getElementById('tipOut').innerHTML = `チップ: ¥${tip.toFixed(2)}<br>合計: ¥${total.toFixed(2)}<br>1人あたり (${split}人): ¥${perPerson.toFixed(2)}`;
}

let worldClock24h = true;

function refreshWorldClock() {
    let container = document.getElementById('worldClockContainer');
    if (!container) return;
    let zones = getAllTimeZones().sort();
    let filter = document.getElementById('worldClockSearch')?.value.toLowerCase() || '';
    let now = new Date();
    let html = '<div class="timezone-grid">';
    zones.forEach(zone => {
        if (filter && !zone.toLowerCase().includes(filter)) return;
        try {
            let time = now.toLocaleTimeString('en-US', { timeZone: zone, hour12: !worldClock24h, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            let date = now.toLocaleDateString('en-US', { timeZone: zone });
            let displayName = zone.replace(/_/g, ' ').split('/').pop() + ' (' + zone.split('/')[0] + ')';
            html += `<div class="timezone-item"><strong>${displayName}</strong><span>${date} ${time}</span></div>`;
        } catch (e) {}
    });
    html += '</div>';
    container.innerHTML = html;
}
function filterWorldClock() { refreshWorldClock(); }

const linkObserver = new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
        mutation.addedNodes.forEach(function(node) {
            if (node.nodeType === 1 && node.tagName === 'A') {
                node.target = '_self';
            }
            if (node.nodeType === 1 && node.querySelectorAll) {
                node.querySelectorAll('a').forEach(function(link) {
                    link.target = '_self';
                });
            }
        });
    });
});
