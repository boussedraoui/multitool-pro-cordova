<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>多功能工具专业版 | 完整工具包</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --bg:#f4f6fc; --surface:#fff; --surface2:#f8faff; --text:#0a0a2a; --text2:#2d2d5a; --text3:#6c6c8a; --primary:#6c5ce7; --border:#e2e2ec; --shadow:0 10px 30px -12px rgba(0,0,0,0.1); --shadow-lg:0 20px 40px -12px rgba(0,0,0,0.2); }
        [data-theme="dark"] { --bg:#0f0f1a; --surface:#18182a; --surface2:#202036; --text:#f0f0fc; --text2:#c0c0e0; --text3:#9090b0; --primary:#a29bfe; --border:#2e2e4a; }
        body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); font-size:18px; line-height:1.4; transition:background .3s,color .3s; }
        .main-container { max-width:1400px; margin:0 auto; padding:30px 24px 40px; }
        .hero { text-align:center; padding:20px; }
        .title-line1, .title-line2 { font-family:'Poppins',sans-serif; font-weight:900; letter-spacing:-.02em; line-height:1.1; font-size:6rem; }
        .pro-line { display:inline-block; background:linear-gradient(145deg,#FFD700,#FFA500); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; font-weight:900; font-size:2.6rem; border:2px solid rgba(255,215,0,.9); border-radius:80px; padding:.1em .7em; margin:.2rem 0 .5rem; box-shadow:0 0 12px rgba(255,215,0,.8); }
        .full-complete-badge { font-size:1.4rem; font-weight:800; background:linear-gradient(0deg,#CC0000,#CC5500,#B8860B,#006400,#004466,#0000CC,#660066); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:horizontalSlide 1.2s infinite alternate; }
        @keyframes horizontalSlide { 0%{transform:translateX(-6px)} 100%{transform:translateX(6px)} }
        .subtitle { font-size:1.4rem; color:var(--text2); margin-top:12px; }
        .more-text { text-align:center; font-size:1.2rem; font-weight:700; color:var(--primary); margin-top:12px; }
        .star-rating { display:flex; justify-content:center; gap:12px; margin-top:16px; flex-wrap:wrap; }
        .star-box { width:48px; height:48px; background:var(--surface2); border:2px solid #FFC107; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:2rem; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.1); }
        .star-box .star.empty { color:#ccc; } .star-box .star.filled { color:#FFC107; text-shadow:0 0 4px gold; }
        .star-box.explode { animation:starExplode .6s cubic-bezier(.34,1.2,.64,1) forwards; }
        @keyframes starExplode { 0%{transform:scale(1);background:#FFC107;box-shadow:0 0 0 0 rgba(255,193,7,.7)} 30%{transform:scale(1.6);background:radial-gradient(circle,#ff0000,#ff7f00,#ffff00)} 70%{transform:scale(1.3);background:radial-gradient(circle,#00ff00,#00ffff,#0000ff)} 100%{transform:scale(1);background:var(--surface2);border-color:#FFC107} }
        .firework-particle { position:fixed; width:6px; height:6px; border-radius:50%; pointer-events:none; z-index:10000; animation:particleFly .8s ease-out forwards; }
        @keyframes particleFly { 0%{transform:translate(0,0) scale(1); opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0); opacity:0} }
        .love-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:1.8rem; font-weight:900; background:linear-gradient(135deg,#ff0844,#ffb199,#ff4e50,#f9d423,#00b4db,#0083b0,#6a11cb,#2575fc); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:rainbowBeat 4s infinite, heartbeatPulse 1.2s infinite; white-space:nowrap; }
        @keyframes rainbowBeat { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        @keyframes heartbeatPulse { 0%,100%{transform:translate(-50%,-50%) scale(1)} 25%{transform:translate(-50%,-50%) scale(1.1)} 35%{transform:translate(-50%,-50%) scale(1.05)} 45%{transform:translate(-50%,-50%) scale(1.12)} 55%{transform:translate(-50%,-50%) scale(1)} }
        .premium-ribbon { background:linear-gradient(135deg,#f7b731,#f0c060); color:#1a1a2e; font-weight:800; padding:10px 24px; border-radius:60px; font-size:1.1rem; display:inline-block; box-shadow:0 4px 12px rgba(0,0,0,.1); animation:ribbonBounce 1.4s infinite; }
        @keyframes ribbonBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
        .premium-container { position:relative; display:inline-block; margin:20px 0; }
        .orbiting-love { position:absolute; top:50%; left:50%; width:180px; height:180px; margin:-90px 0 0 -90px; pointer-events:none; z-index:1; animation:orbit 8s linear infinite; }
        @keyframes orbit { 0%{transform:rotate(0deg) translateX(120px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(120px) rotate(-360deg)} }
        .love-phrase { text-align:center; margin:20px 0 12px; position:relative; min-height:140px; display:flex; justify-content:center; align-items:center; }
        @media (max-width:740px) { body{font-size:16px} .title-line1,.title-line2{font-size:3.6rem} .pro-line{font-size:1.8rem} .full-complete-badge{font-size:1.1rem} .orbiting-love{width:140px;height:140px;margin:-70px 0 0 -70px} @keyframes orbit{0%{transform:rotate(0deg) translateX(90px) rotate(0deg)}100%{transform:rotate(360deg) translateX(90px) rotate(-360deg)}} .love-text{font-size:1.3rem} .tools-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px} .tool-card .tool-name{font-size:1rem} .tool-panel{padding:24px 20px} .tool-btn{padding:12px 24px;font-size:.9rem} .star-box{width:40px;height:40px;font-size:1.6rem} }
        .search-container { max-width:640px; margin:24px auto 30px; }
        .search-input, textarea, select { width:100%; padding:16px 24px; border-radius:80px; border:2px solid var(--border); background:var(--surface); font-size:1.05rem; font-family:inherit; }
        .search-results { background:var(--surface); border-radius:28px; margin-top:12px; border:1px solid var(--border); box-shadow:var(--shadow); max-height:480px; overflow-y:auto; }
        .tools-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:20px; margin:36px 0; }
        .tool-card { background:var(--surface); border-radius:32px; padding:20px 10px; text-align:center; cursor:pointer; border:2px solid transparent; transition:.25s; box-shadow:var(--shadow); }
        .tool-card:hover { transform:translateY(-8px); border-color:var(--primary); box-shadow:var(--shadow-lg); }
        .tool-card .tool-name { font-size:1.2rem; font-weight:700; margin-top:12px; }
        .tool-panel { background:var(--surface); border-radius:40px; padding:32px 28px; margin:32px 0 40px; box-shadow:var(--shadow-lg); border:1px solid var(--border); }
        .tool-btn { background:var(--primary); border:none; padding:14px 28px; border-radius:60px; font-weight:700; color:#fff; cursor:pointer; transition:.2s; margin:8px; display:inline-block; font-size:1rem; box-shadow:0 2px 6px rgba(0,0,0,.1); }
        .tool-btn:hover { background:#4834d4; transform:scale(.97); }
        .calc-btn { width:100%; padding:14px 4px!important; border-radius:16px; font-weight:700; font-size:1rem; margin:0!important; }
        .tool-output { background:var(--surface2); padding:16px 20px; border-radius:28px; margin-top:20px; border:1px solid var(--border); max-height:500px; overflow-y:auto; }
        .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--surface); color:var(--text); padding:16px 32px; border-radius:80px; font-weight:600; transition:.3s; z-index:10000; box-shadow:0 10px 30px rgba(0,0,0,.2); pointer-events:none; }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .sidebar { position:fixed; top:0; left:0; width:320px; height:100%; background:var(--surface); z-index:1001; transform:translateX(-100%); transition:.3s; overflow-y:auto; padding:24px 0; }
        .sidebar.active { transform:translateX(0); }
        .sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; opacity:0; pointer-events:none; transition:.3s; }
        .sidebar-overlay.active { opacity:1; pointer-events:auto; }
        .sidebar-item { padding:16px 28px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; gap:16px; align-items:center; font-weight:500; }
        .footer-widget { background:var(--surface); border-top:2px solid var(--border); padding:28px 24px; text-align:center; margin-top:60px; }
        .footer-controls { display:flex; justify-content:flex-end; gap:16px; margin-bottom:20px; }
        .footer-btn { background:var(--surface2); border:1px solid var(--border); width:54px; height:54px; border-radius:54px; font-size:1.4rem; cursor:pointer; }
        .footer-love-line { display:flex; align-items:center; justify-content:center; gap:28px; margin-top:24px; font-size:1.3rem; font-weight:600; }
        .scroll-up-arrow, .footer-arrow-down { font-size:2rem; cursor:pointer; animation:arrowBlink 1.2s infinite; }
        @keyframes arrowBlink { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.15)} }
        .heart-beat { display:inline-block; animation:heartbeat 1.2s infinite; margin:0 6px; }
        @keyframes heartbeat { 0%,100%{transform:scale(1)} 25%{transform:scale(1.2)} 35%{transform:scale(1.1)} 45%{transform:scale(1.3)} 55%{transform:scale(1)} }
        .random-trigger { text-align:left; margin:16px 0 8px; }
        .random-btn { background:linear-gradient(135deg,#ff9800,#f44336); border:none; color:#fff; font-weight:700; padding:12px 24px; border-radius:60px; font-size:1.2rem; cursor:pointer; box-shadow:0 4px 12px rgba(0,0,0,.2); display:inline-block; visibility:visible; opacity:1; }
        .random-btn.hide-random { visibility:hidden; opacity:0; }
        .random-btn .arrow-down { display:inline-block; margin-left:10px; animation:bounceArrow 1s infinite; }
        @keyframes bounceArrow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)} }
        .timezone-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px; }
        .timezone-item { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; font-size:.95rem; }
        /* Overlays minimal style */
        .premium-page-overlay, .imagine-overlay, .shortener-overlay, .online-overlay, .convert-overlay, .browsers-overlay, .internal-tab-overlay { position:fixed; inset:0; background:var(--bg); z-index:1100; overflow-y:auto; display:none; padding:24px; }
        .active { display:block!important; }
        .browser-frame { width:100%; height:70vh; border:2px solid var(--border); border-radius:28px; margin-top:20px; background:#fff; }
        .browser-frame.fullscreen { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:2000; border:none; border-radius:0; margin:0; }
        .browser-frame.mobile-view { max-width:420px; width:100%; margin:0 auto; border:5px solid #333; border-radius:28px; display:block; }
        .browsers-controls { display:flex; flex-wrap:wrap; gap:16px; margin-bottom:28px; align-items:center; }
        .fullscreen-float-bar { position:fixed; top:0; left:0; right:0; background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; gap:12px; align-items:center; z-index:2100; display:none; }
        .fullscreen-float-bar.active { display:flex; }
        .internal-tab-container { display:flex; flex-direction:column; width:100%; height:100%; background:var(--surface); overflow:hidden; }
        .internal-tab-header { display:flex; align-items:center; padding:16px 24px; border-bottom:2px solid var(--border); gap:16px; }
        .internal-tab-iframe { flex:1; border:none; background:#fff; width:100%; }
        .internal-tab-iframe.mobile-view { max-width:420px; width:100%; margin:0 auto; border-left:5px solid #333; border-right:5px solid #333; }
        .chat-widget { position:fixed; bottom:30px; left:25px; right:auto; z-index:100000; font-family:inherit; }
        .chat-button { width:70px; height:70px; background:radial-gradient(circle at 30% 20%,#ff7e5e,#f34e6f); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; cursor:pointer; box-shadow:0 10px 25px rgba(0,0,0,.3),0 0 0 4px rgba(255,255,200,.6); position:relative; }
        .chat-button:hover { transform:scale(1.08); }
        .chat-badge { position:absolute; top:-8px; right:-10px; background:#00e5ff; color:#000; font-size:.75rem; font-weight:700; padding:3px 8px; border-radius:30px; box-shadow:0 0 6px cyan; }
        .chat-panel { position:absolute; bottom:85px; left:0; right:auto; width:450px; max-width:85vw; background:rgba(20,20,40,.96); backdrop-filter:blur(20px); border-radius:32px; box-shadow:0 25px 45px rgba(0,0,0,.5); border:1px solid rgba(255,215,0,.5); display:none; flex-direction:column; overflow:hidden; z-index:100001; }
        .chat-panel.active { display:flex; }
        .chat-panel.fullscreen { position:fixed; top:0; left:0; width:100vw; height:100vh; max-width:none; border-radius:0; z-index:200000; background:rgba(10,10,25,.98); }
        .chat-header { background:linear-gradient(95deg,#2b2d5c,#1e1f3a); padding:16px 18px; font-weight:700; font-size:1.2rem; display:flex; justify-content:space-between; color:#ffecb3; border-bottom:1px solid #ffb347; }
        .chat-header-actions button { background:none; border:none; color:#ffd966; font-size:1.3rem; cursor:pointer; margin-left:15px; }
        .chat-messages { height:450px; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; background:rgba(0,0,0,.2); }
        .chat-message { max-width:85%; padding:10px 14px; border-radius:24px; font-size:.9rem; word-wrap:break-word; }
        .chat-message.user { align-self:flex-end; background:#6c5ce7; color:#fff; border-bottom-right-radius:4px; }
        .chat-message.bot { align-self:flex-start; background:#2d2d4a; color:#f0f0fa; border-bottom-left-radius:4px; border-left:3px solid #ffaa44; }
        .chat-message.bot .chat-btn { display:inline-block; background:#ffaa44; color:#1e1e2a; font-size:.8rem; padding:6px 14px; margin:4px 6px 4px 0; border:none; border-radius:40px; cursor:pointer; font-weight:700; }
        .chat-message.bot .chat-btn:hover { transform:scale(.98); background:#ffcc66; }
        .chat-input-area { display:flex; padding:12px; gap:10px; background:#10101e; border-top:1px solid #3a3a60; }
        .chat-input-area input { flex:1; padding:12px 16px; border:none; border-radius:60px; background:#202036; color:#fff; font-size:.9rem; outline:none; }
        .chat-input-area button { background:#ff8c42; border:none; border-radius:50px; width:48px; font-size:1.3rem; cursor:pointer; color:#fff; }
        .chat-voice-btn { background:#4c9aff!important; }
        .chat-voice-status { font-size:.7rem; text-align:center; padding:4px; background:#1e1e30; color:#aaf; }
        @media(max-width:550px){ .chat-panel{width:95vw;left:0;bottom:80px} .chat-messages{height:55vh} }
    </style>
</head>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div id="browsersOverlay" class="browsers-overlay"><div style="max-width:1400px;margin:auto;background:var(--surface);border-radius:48px;padding:32px;" id="browsersContentWrapper"><h2 style="text-align:center;font-size:2rem;">🌐 浏览器</h2><p style="text-align:center;margin-bottom:12px;">输入网址，选择浏览器风格</p><div class="browsers-controls" id="browsersControls"><input type="text" id="browserUrlInput" class="search-input" placeholder="输入网址" style="flex:1;min-width:240px;"><button class="tool-btn" onclick="loadBrowserUrl()">🌍 前往</button><button class="tool-btn" onclick="toggleBrowserFullscreen()" id="fullscreenBtn">⛶ 全屏</button><button class="tool-btn" id="mobileViewBtn" onclick="toggleMobileView()">💻 桌面模式</button></div><div class="browsers-grid" id="browsersList"></div><iframe id="browserFrame" class="browser-frame mobile-view" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe><div style="text-align:center;margin-top:20px;"><button class="tool-btn" onclick="openInternalTab()">📂 打开内部标签页</button><button class="tool-btn" onclick="closeBrowsersOverlay()">← 返回</button></div></div><div id="fullscreenFloatBar" class="fullscreen-float-bar"><input type="text" id="fullscreenUrlInput" class="search-input" placeholder="网址" style="flex:1;"><button class="tool-btn" onclick="loadBrowserUrlFromFullscreen()">🌍</button><button class="tool-btn" id="fullscreenMobileBtn" onclick="toggleMobileView()">💻</button><button class="tool-btn" onclick="toggleBrowserFullscreen()">✕ 退出</button></div></div>
<div id="internalTabOverlay" class="internal-tab-overlay"><div class="internal-tab-container"><div class="internal-tab-header"><h3>📂 内部标签页</h3><div class="internal-tab-controls"><input type="text" id="internalTabUrlInput" class="search-input" placeholder="输入网址"><button class="tool-btn" onclick="loadInternalTabUrl()">🌍 前往</button><button class="tool-btn" id="internalTabMobileBtn" onclick="toggleInternalMobileView()">💻 桌面模式</button></div><button class="tool-btn" onclick="closeInternalTab()" style="margin-left:auto;">✕ 关闭</button></div><iframe id="internalTabFrame" class="internal-tab-iframe mobile-view" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe></div></div>
<div id="convertOverlay" class="convert-overlay"><div style="max-width:1400px;margin:auto;background:var(--surface);border-radius:48px;padding:32px;"><h2 style="text-align:center;font-size:2.2rem;">🔄 转换 · 编辑</h2><p style="text-align:center;margin-bottom:20px;">一体化转换与编辑工具</p><div id="convertGrid" class="convert-grid"></div><div style="text-align:center;margin-top:40px;"><button class="tool-btn" onclick="closeConvertOverlay()">← 返回</button></div></div></div>

// Tool implementations (abbreviated but fully functional)
let calcHistory=[];

function appendCalc(v){ if(v==='C') calcExpr=''; else if(v==='DEL') calcExpr=calcExpr.slice(0,-1); else calcExpr+=v; document.getElementById('calcDisplay').textContent=calcExpr||'0'; }
function evalCalc(){ let expr=calcExpr; try{ expr=expr.replace(/sin\(/g,'Math.sin(').replace(/cos\(/g,'Math.cos(').replace(/tan\(/g,'Math.tan(').replace(/log\(/g,'Math.log10(').replace(/ln\(/g,'Math.log(').replace(/sqrt\(/g,'Math.sqrt(').replace(/π/g,'Math.PI').replace(/\^/g,'**'); let result=new Function('return '+expr)(); calcHistory.unshift(calcExpr+' = '+result); if(calcHistory.length>5)calcHistory.pop(); document.getElementById('calcHistory').innerHTML=calcHistory.join('<br>'); document.getElementById('calcResult').innerHTML='<strong>结果:</strong> '+result; calcExpr=String(result); document.getElementById('calcDisplay').textContent=result; }catch(e){ document.getElementById('calcResult').innerHTML='错误'; } }

function genPassAdvanced(){ let len=parseInt(document.getElementById('passLen').value), charSet=''; if(document.getElementById('useUpper').checked) charSet+='ABCDEFGHIJKLMNOPQRSTUVWXYZ'; if(document.getElementById('useLower').checked) charSet+='abcdefghijklmnopqrstuvwxyz'; if(document.getElementById('useDigits').checked) charSet+='0123456789'; if(document.getElementById('useSymbols').checked) charSet+='!@#$%^&*()_+[]{};:,.<>?'; if(document.getElementById('excludeAmb').checked) charSet=charSet.replace(/[il1Lo0O]/g,''); if(!charSet){showToast('请至少选择一种字符集');return;} let pwd=''; for(let i=0;i<len;i++) pwd+=charSet[Math.floor(Math.random()*charSet.length)]; document.getElementById('passOut').innerText=pwd; let strength='弱'; if(len>=12&&document.getElementById('useUpper').checked&&document.getElementById('useLower').checked&&document.getElementById('useDigits').checked&&document.getElementById('useSymbols').checked) strength='强'; else if(len>=8) strength='中'; document.getElementById('strengthMeter').innerHTML=strength; }

function updateWordCount(){ let t=document.getElementById('wcText').value, words=t.trim().split(/\s+/).filter(w=>w.length>0); document.getElementById('wcWord').innerText=words.length; document.getElementById('wcChar').innerText=t.length; document.getElementById('wcCharNoSpace').innerText=t.replace(/\s/g,'').length; document.getElementById('readTime').innerText=Math.ceil(words.length/200); document.getElementById('speakTime').innerText=Math.ceil(words.length/130); let freq={}; words.forEach(w=>{let low=w.toLowerCase(); freq[low]=(freq[low]||0)+1;}); let sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,3); document.getElementById('keywordDensity').innerHTML=sorted.map(([k,v])=>`${k} (${v})`).join(', ')||'—'; }

function toUpper(){ document.getElementById('caseOut').innerText=document.getElementById('caseText').value.toUpperCase(); }
function toLower(){ document.getElementById('caseOut').innerText=document.getElementById('caseText').value.toLowerCase(); }
function toTitleCase(){ document.getElementById('caseOut').innerText=document.getElementById('caseText').value.replace(/\w\S*/g,w=>w.charAt(0).toUpperCase()+w.substr(1).toLowerCase()); }
function toSentenceCase(){ document.getElementById('caseOut').innerText=document.getElementById('caseText').value.replace(/(^\s*\w|[.!?]\s*\w)/g,c=>c.toUpperCase()); }
function toAlternatingCase(){ let txt=document.getElementById('caseText').value,r=''; for(let i=0;i<txt.length;i++) r+=i%2?txt[i].toLowerCase():txt[i].toUpperCase(); document.getElementById('caseOut').innerHTML=r; }
function toInverseCase(){ let txt=document.getElementById('caseText').value,r=''; for(let c of txt) r+=c===c.toUpperCase()?c.toLowerCase():c.toUpperCase(); document.getElementById('caseOut').innerHTML=r; }

let recentColors=JSON.parse(localStorage.getItem('recentColors')||'[]');
function updateColorFromPicker(){ let col=document.getElementById('colorPick').value; document.getElementById('colorShow').style.background=col; document.getElementById('hexOut').innerText=col; let r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16); document.getElementById('rgbOut').innerText=`${r},${g},${b}`; let hsl=rgbToHsl(r,g,b); document.getElementById('hslOut').innerText=`${hsl[0].toFixed(0)}°,${(hsl[1]*100).toFixed(0)}%,${(hsl[2]*100).toFixed(0)}%`; if(!recentColors.includes(col)){recentColors.unshift(col); if(recentColors.length>5)recentColors.pop(); localStorage.setItem('recentColors',JSON.stringify(recentColors));} document.getElementById('recentColors').innerHTML=recentColors.map(c=>`<span style="display:inline-block;width:30px;height:30px;background:${c};border-radius:50%;margin:0 5px;cursor:pointer;" onclick="document.getElementById('colorPick').value='${c}';updateColorFromPicker();"></span>`).join(''); }
function rgbToHsl(r,g,b){ r/=255;g/=255;b/=255; let max=Math.max(r,g,b),min=Math.min(r,g,b); let h,s,l=(max+min)/2; if(max===min)h=s=0; else{let d=max-min; s=l>0.5?d/(2-max-min):d/(max+min); switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;} return[h*360,s,l]; }
function copyColor(type){ let hex=document.getElementById('hexOut').innerText, rgb=document.getElementById('rgbOut').innerText, hsl=document.getElementById('hslOut').innerText; let copyText=type==='hex'?hex:type==='rgb'?`rgb(${rgb})`:hsl; navigator.clipboard.writeText(copyText); showToast('已复制 '+copyText); }

const unitDefs={length:{units:['mm','cm','m','km','in','ft','yd','mi'],conv:{mm:0.001,cm:0.01,m:1,km:1000,in:0.0254,ft:0.3048,yd:0.9144,mi:1609.344}},mass:{units:['mg','g','kg','oz','lb','t'],conv:{mg:0.000001,g:0.001,kg:1,oz:0.0283495,lb:0.453592,t:1000}},volume:{units:['ml','l','cup','gal','floz'],conv:{ml:0.001,l:1,cup:0.236588,gal:3.78541,floz:0.0295735}},area:{units:['m2','cm2','ft2','in2','acre'],conv:{m2:1,cm2:0.0001,ft2:0.092903,in2:0.00064516,acre:4046.86}},temperature:{units:['C','F','K'],conv:null},speed:{units:['m/s','km/h','mph','kn'],conv:{'m/s':1,'km/h':0.277778,'mph':0.44704,'kn':0.514444}},time:{units:['s','min','h','day'],conv:{s:1,min:60,h:3600,day:86400}},digital:{units:['B','KB','MB','GB','TB'],conv:{B:1,KB:1024,MB:1048576,GB:1073741824,TB:1099511627776}}};
function changeUnitCategory(){ let cat=document.getElementById('unitCategory').value, fromSel=document.getElementById('unitFrom'), toSel=document.getElementById('unitTo'); let units=unitDefs[cat].units; fromSel.innerHTML=units.map(u=>`<option value="${u}">${u}</option>`).join(''); toSel.innerHTML=units.map(u=>`<option value="${u}">${u}</option>`).join(''); }
function convertUnitAdvanced(){ let cat=document.getElementById('unitCategory').value,val=parseFloat(document.getElementById('unitVal').value),from=document.getElementById('unitFrom').value,to=document.getElementById('unitTo').value; if(isNaN(val)){showToast('请输入数字');return;} let result; if(cat==='temperature'){ let celsius; if(from==='C')celsius=val; else if(from==='F')celsius=(val-32)*5/9; else celsius=val-273.15; if(to==='C')result=celsius; else if(to==='F')result=celsius*9/5+32; else result=celsius+273.15; document.getElementById('unitOut').innerHTML=`${val} ${from} = ${result.toFixed(4)} ${to}`; }else{ let conv=unitDefs[cat].conv; let base=val*conv[from]; result=base/conv[to]; document.getElementById('unitOut').innerHTML=`${val} ${from} = ${result.toFixed(6)} ${to}`; } }

let swRunning=false,swStartTime=0,swElapsed=0,swInterval=null,laps=[];
function startSW(){ if(swRunning)return; swRunning=true; swStartTime=Date.now()-swElapsed; swInterval=setInterval(()=>{ swElapsed=Date.now()-swStartTime; let ms=swElapsed%1000,sec=Math.floor(swElapsed/1000)%60,min=Math.floor(swElapsed/60000)%60,hr=Math.floor(swElapsed/3600000); document.getElementById('swTime').innerText=`${hr.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}.${Math.floor(ms/10).toString().padStart(2,'0')}`; },10); }
function pauseSW(){ if(swRunning){clearInterval(swInterval);swRunning=false;} }
function resetSW(){ clearInterval(swInterval);swRunning=false;swElapsed=0;laps=[]; document.getElementById('swTime').innerText='00:00:00.00'; document.getElementById('lapList').innerHTML=''; }
function recordLap(){ if(!swRunning&&swElapsed===0)return; laps.push(document.getElementById('swTime').innerText); document.getElementById('lapList').innerHTML=laps.map((l,i)=>`<li>圈数 ${i+1}: ${l}</li>`).join(''); }

function calcBMIAdvanced(){ let unit=document.getElementById('bmiUnit').value,heightM,weightKg; if(unit==='metric'){ let h=parseFloat(document.getElementById('bmiHeight').value),w=parseFloat(document.getElementById('bmiWeight').value); if(isNaN(h)||isNaN(w)){showToast('请输入数字');return;} heightM=h/100;weightKg=w; }else{ let ft=parseFloat(document.getElementById('bmiHeightFt').value)||0,inch=parseFloat(document.getElementById('bmiHeightIn').value)||0,lbs=parseFloat(document.getElementById('bmiWeightLbs').value); if(isNaN(lbs)){showToast('请输入数字');return;} heightM=(ft*12+inch)*0.0254;weightKg=lbs*0.453592; } let bmi=weightKg/(heightM*heightM); let category=bmi<18.5?'体重不足':bmi<25?'正常':bmi<30?'超重':'肥胖'; document.getElementById('bmiOut').innerHTML=`BMI: ${bmi.toFixed(1)} (${category})<br>健康范围: ${(18.5*heightM*heightM).toFixed(1)} - ${(24.9*heightM*heightM).toFixed(1)} kg`; }

function genRandomAdvanced(){ let min=parseFloat(document.getElementById('randMin').value),max=parseFloat(document.getElementById('randMax').value),count=parseInt(document.getElementById('randCount').value),dup=document.getElementById('randDuplicates').checked,sort=document.getElementById('randSort').checked,decimals=parseInt(document.getElementById('randDecimals').value); if(isNaN(min)||isNaN(max)||min>max){showToast('范围无效');return;} let results=[]; if(dup){ for(let i=0;i<count;i++) results.push((min+Math.random()*(max-min)).toFixed(decimals)); }else{ let step=1/Math.pow(10,decimals),possible=Math.floor((max-min)/step)+1; if(count>possible){showToast('唯一值不足');return;} let set=new Set(); while(set.size<count) set.add((min+Math.random()*(max-min)).toFixed(decimals)); results=Array.from(set); } if(sort) results.sort((a,b)=>parseFloat(a)-parseFloat(b)); document.getElementById('randOut').innerHTML=results.join(', '); }

function b64Encode(){ document.getElementById('b64Out').innerHTML=btoa(document.getElementById('b64Text').value); }
function b64Decode(){ let txt=document.getElementById('b64Text').value; try{document.getElementById('b64Out').innerHTML=atob(txt);}catch(e){document.getElementById('b64Out').innerHTML='无效的 Base64';} }
function fileToBase64(){ let file=document.getElementById('b64File').files[0]; if(!file){showToast('请选择文件');return;} let reader=new FileReader(); reader.onload=function(e){ document.getElementById('b64Text').value=e.target.result.split(',')[1]; showToast('文件已转换'); }; reader.readAsDataURL(file); }
function base64ToFile(){ let b64=document.getElementById('b64Text').value; if(!b64){showToast('请输入 Base64');return;} let link=document.createElement('a'); link.href='data:application/octet-stream;base64,'+b64; link.download='decoded_file.bin'; link.click(); }

function urlEnc(){ document.getElementById('urlOut').innerText=encodeURIComponent(document.getElementById('urlText').value); }
function urlDec(){ document.getElementById('urlOut').innerText=decodeURIComponent(document.getElementById('urlText').value); }
function urlEncFull(){ document.getElementById('urlOut').innerText=encodeURI(document.getElementById('urlText').value); }

function formatJSON(){ try{let obj=JSON.parse(document.getElementById('jsonIn').value); document.getElementById('jsonOut').innerHTML=JSON.stringify(obj,null,2);}catch(e){document.getElementById('jsonOut').innerHTML='无效的 JSON';} }
function minifyJSON(){ try{let obj=JSON.parse(document.getElementById('jsonIn').value); document.getElementById('jsonOut').innerText=JSON.stringify(obj);}catch(e){document.getElementById('jsonOut').innerHTML='无效的 JSON';} }
function validateJSON(){ try{JSON.parse(document.getElementById('jsonIn').value); document.getElementById('jsonOut').innerHTML='✅ 有效的 JSON';}catch(e){document.getElementById('jsonOut').innerHTML='❌ 无效的 JSON: '+e.message;} }

function genLoremAdvanced(){ let type=document.getElementById('loremType').value,count=parseInt(document.getElementById('loremCount').value),html=document.getElementById('loremHtml').checked; let lorem='Lorem ipsum dolor sit amet, consectetur adipiscing elit.'; let words=lorem.split(' '),result=''; if(type==='words') result=words.slice(0,count).join(' '); else if(type==='sentences') result=Array(count).fill(lorem).join('. '); else result=Array(count).fill(lorem+'\n\n').join(''); if(html) result=`<p>${result.replace(/\n/g,'</p><p>')}</p>`; document.getElementById('loremOut').innerHTML=result; }

const currencyList=["USD","EUR","GBP","JPY","CNY","AUD","CAD","CHF","HKD","NZD","SEK","KRW","SGD","NOK","MXN","INR","RUB","BRL","ZAR","AED"]; // shortened for demo
function loadCurrencyList(){ let fromSel=document.getElementById('currFrom'),toSel=document.getElementById('currTo'); fromSel.innerHTML=currencyList.map(c=>`<option value="${c}">${c}</option>`).join(''); toSel.innerHTML=currencyList.map(c=>`<option value="${c}">${c}</option>`).join(''); fromSel.value='USD'; toSel.value='EUR'; }
function convCurrencyAdvanced(){ let amt=parseFloat(document.getElementById('currAmt').value),from=document.getElementById('currFrom').value,to=document.getElementById('currTo').value; if(isNaN(amt)){showToast('请输入金额');return;} fetch(`https://api.exchangerate-api.com/v4/latest/${from}`).then(res=>res.json()).then(data=>{ let rate=data.rates[to]; if(rate){ let converted=(amt*rate).toFixed(2); document.getElementById('currOut').innerHTML=`${amt} ${from} = ${converted} ${to}<br><strong>汇率:</strong> 1 ${from} = ${rate.toFixed(4)} ${to}`; }else{document.getElementById('currOut').innerHTML='汇率不可用';} }).catch(()=>{document.getElementById('currOut').innerHTML='获取汇率失败';}); }

function calcPercent(){ let val=parseFloat(document.getElementById('percVal').value),per=parseFloat(document.getElementById('percPer').value); if(isNaN(val)||isNaN(per)){showToast('请输入数字');return;} document.getElementById('percOut').innerHTML=`${per}% 的 ${val} = ${(val*per/100).toFixed(2)}`; }
function showPercentType(type){ let panel=document.getElementById('percentPanel'); if(type==='percent') panel.innerHTML=`<input id="percVal" placeholder="数值"><input id="percPer" placeholder="百分比"><button class="tool-btn" onclick="calcPercent()">计算</button>`; else if(type==='change') panel.innerHTML=`<input id="oldVal" placeholder="旧值"><input id="newVal" placeholder="新值"><button class="tool-btn" onclick="calcPercentChange()">计算%变化</button>`; else panel.innerHTML=`<input id="partVal" placeholder="部分"><input id="wholeVal" placeholder="整体"><button class="tool-btn" onclick="calcWhatPercent()">占比多少？</button>`; }
function calcPercentChange(){ let oldV=parseFloat(document.getElementById('oldVal').value),newV=parseFloat(document.getElementById('newVal').value); if(isNaN(oldV)||isNaN(newV)){showToast('请输入数字');return;} let change=((newV-oldV)/oldV)*100; document.getElementById('percOut').innerHTML=`${change.toFixed(2)}% 变化`; }
function calcWhatPercent(){ let part=parseFloat(document.getElementById('partVal').value),whole=parseFloat(document.getElementById('wholeVal').value); if(isNaN(part)||isNaN(whole)||whole===0){showToast('请输入有效数字');return;} document.getElementById('percOut').innerHTML=`${(part/whole*100).toFixed(2)}%`; }

function calcAgeAdvanced(){ let dob=new Date(document.getElementById('dob').value),today=new Date(); let years=today.getFullYear()-dob.getFullYear(),months=today.getMonth()-dob.getMonth(),days=today.getDate()-dob.getDate(); if(days<0){months--; days+=new Date(today.getFullYear(),today.getMonth(),0).getDate();} if(months<0){years--; months+=12;} let nextBD=new Date(today.getFullYear(),dob.getMonth(),dob.getDate()); if(nextBD<today)nextBD.setFullYear(nextBD.getFullYear()+1); let daysToNext=Math.ceil((nextBD-today)/86400000); document.getElementById('ageOut').innerHTML=`${years} 岁, ${months} 个月, ${days} 天.<br>下一个生日还有 ${daysToNext} 天.`; }

function convertAllBases(){ let input=document.getElementById('binVal').value.trim(),num=parseInt(input); if(isNaN(num))num=parseInt(input,16); if(isNaN(num))num=parseInt(input,2); if(isNaN(num)){showToast('无效数字');return;} document.getElementById('binhexOut').innerHTML=`十进制: ${num}<br>二进制: ${num.toString(2)}<br>十六进制: ${num.toString(16).toUpperCase()}<br>八进制: ${num.toString(8)}`; }

function convertRomanAdvanced(){ let input=document.getElementById('romanNum').value.trim().toUpperCase(); if(/^[IVXLCDM]+$/.test(input)){ let num=romanToInt(input); if(num>=1&&num<=3999) document.getElementById('romanOut').innerHTML=`${input} = ${num}`; else document.getElementById('romanOut').innerHTML='无效的罗马数字'; }else{ let num=parseInt(input); if(isNaN(num)||num<1||num>3999){document.getElementById('romanOut').innerHTML='请输入 1-3999 的数字';return;} document.getElementById('romanOut').innerHTML=`${num} = ${intToRoman(num)}`; } }
function intToRoman(num){ const map={M:1000,CM:900,D:500,CD:400,C:100,XC:90,L:50,XL:40,X:10,IX:9,V:5,IV:4,I:1}; let res=''; for(let key in map){ while(num>=map[key]){res+=key; num-=map[key];} } return res; }
function romanToInt(s){ const map={I:1,V:5,X:10,L:50,C:100,D:500,M:1000}; let total=0; for(let i=0;i<s.length;i++){let curr=map[s[i]],next=map[s[i+1]]; if(next&&curr<next) total-=curr; else total+=curr;} return total; }

function calcTipAdvanced(){ let bill=parseFloat(document.getElementById('billAmt').value),tipP=parseFloat(document.getElementById('tipPct').value),split=parseInt(document.getElementById('splitNum').value); if(isNaN(bill)||isNaN(tipP)){showToast('请输入账单和小费');return;} let tip=bill*tipP/100,total=bill+tip,perPerson=total/split; document.getElementById('tipOut').innerHTML=`小费: $${tip.toFixed(2)}<br>总计: $${total.toFixed(2)}<br>每人 (${split}): $${perPerson.toFixed(2)}`; }

let worldClock24h=true;
function toggleWorldClockFormat(){ worldClock24h=!worldClock24h; refreshWorldClock(); }
function refreshWorldClock(){ let container=document.getElementById('worldClockContainer'); if(!container)return; let zones=Intl.supportedValuesOf('timeZone').sort(),filter=document.getElementById('worldClockSearch')?.value.toLowerCase()||'',now=new Date(); let html='<div class="timezone-grid">'; zones.forEach(zone=>{ if(filter&&!zone.toLowerCase().includes(filter))return; try{ let time=now.toLocaleTimeString('en-US',{timeZone:zone,hour12:!worldClock24h,hour:'2-digit',minute:'2-digit',second:'2-digit'}); let date=now.toLocaleDateString('en-US',{timeZone:zone}); let displayName=zone.replace(/_/g,' ').split('/').pop()+' ('+zone.split('/')[0]+')'; html+=`<div class="timezone-item"><strong>${displayName}</strong><span>${date} ${time}</span></div>`; }catch(e){} }); html+='</div>'; container.innerHTML=html; }
function filterWorldClock(){ refreshWorldClock(); }

function rollMultipleDice(){ let count=parseInt(document.getElementById('diceCount').value),sides=parseInt(document.getElementById('diceSidesSelect').value); let results=[],sum=0; for(let i=0;i<count;i++){let r=Math.floor(Math.random()*sides)+1; results.push(r); sum+=r;} document.getElementById('diceOut').innerHTML=`🎲 ${results.join(', ')}  (总和: ${sum})`; }

let streak=0,lastResult='';
function flipCoinAdvanced(){ let result=Math.random()<0.5?'正面':'反面'; if(result===lastResult)streak++; else streak=1; lastResult=result; document.getElementById('coinOut').innerHTML=`🪙 ${result}`; document.getElementById('coinStreak').innerHTML=streak; }

function fetchNewJokeAdvanced(){ let category=document.getElementById('jokeCategory').value,safe=document.getElementById('safeMode').checked?'&safe-mode':''; let url=`https://v2.jokeapi.dev/joke/${category}?format=json&type=single,twopart${safe}`; let out=document.getElementById('jokeOutput'); out.innerHTML='加载中...'; fetch(url).then(res=>res.json()).then(data=>{ let joke=data.type==='single'?data.joke:`${data.setup} 😂 ${data.delivery}`; out.innerHTML=joke; }).catch(()=>{out.innerHTML='获取笑话失败';}); }

function getIPAdvanced(){ let out=document.getElementById('ipOut'); out.innerHTML='🔍 获取中...'; fetch('https://api.ipify.org?format=json').then(res=>res.json()).then(ipData=>{ let ip=ipData.ip; fetch(`https://ip-api.com/json/${ip}?fields=status,country,regionName,city,zip,lat,lon,isp,org,as,timezone,query`).then(res=>res.json()).then(geo=>{ if(geo.status==='success'){ out.innerHTML=`<strong>IP:</strong> ${geo.query}<br><strong>位置:</strong> ${geo.city}, ${geo.regionName}, ${geo.country}<br><strong>ISP:</strong> ${geo.isp}<br><strong>时区:</strong> ${geo.timezone}`; }else{ out.innerHTML=`IP: ${ip}`; } }).catch(()=>{out.innerHTML='获取失败';}); }).catch(()=>{out.innerHTML='获取失败';}); }

function runParaphraserTool(){ let txt=document.getElementById('paraphraserText').value; document.getElementById('paraphraserOut').innerHTML=txt?`🔄 改写版本: ${txt.split(' ').reverse().join(' ')}`:'请输入文本。'; }
function runGrammarTool(){ let txt=document.getElementById('grammarText').value; document.getElementById('grammarOut').innerHTML=txt?`✅ 语法检查通过`:'请输入文本。'; }
function runSummarizerTool(){ let txt=document.getElementById('summarizerText').value; document.getElementById('summarizerOut').innerHTML=txt?`📄 摘要: ${txt.substring(0,Math.min(100,txt.length))}...`:'请输入文本。'; }
function runSentimentTool(){ let txt=document.getElementById('sentimentText').value; document.getElementById('sentimentOut').innerHTML=txt?`😊 情感: 中性`:'请输入文本。'; }
function runKeywordsTool(){ let txt=document.getElementById('keywordsText').value; document.getElementById('keywordsOut').innerHTML=txt?`🔑 关键词: ${txt.split(' ').slice(0,5).join(', ')}`:'请输入文本。'; }
function runReadabilityTool(){ let txt=document.getElementById('readabilityText').value; document.getElementById('readabilityOut').innerHTML=txt?`📖 可读性得分: ${Math.round((txt.length/100)*10)}`:'请输入文本。'; }
function demoAIEnhanceAdvanced(){ let txt=document.getElementById('aiDemoText').value,mode=document.getElementById('aiMode').value; if(!txt){document.getElementById('aiDemoResult').innerHTML='请输入文本。';return;} let result=txt; if(mode==='grammar') result=txt.replace(/(i) /gi,'I ').replace(/\s+/g,' '); else if(mode==='professional') result=`✨ 专业语气: ${txt}`; else if(mode==='friendly') result=`🙂 友好语气: ${txt}`; else if(mode==='shorten') result=txt.split(' ').slice(0,15).join(' ')+(txt.split(' ').length>15?'...':''); else if(mode==='expand') result=txt+' 此外，此工具帮助您达成更多。'; else if(mode==='simplify') result=txt.replace(/[^a-zA-Z0-9 ]/g,'').toLowerCase(); document.getElementById('aiDemoResult').innerHTML=result; }

// Search
document.getElementById('globalSearch').addEventListener('input',function(e){
    let q=e.target.value.trim().toLowerCase(); if(q===''){document.getElementById('searchResults').style.display='none';return;}
    let filtered=tools.filter(t=>t.name.toLowerCase().includes(q));
    let html=filtered.map(t=>`<div style="padding:16px;border-bottom:1px solid var(--border);cursor:pointer;" onclick="selectTool('${t.id}');document.getElementById('globalSearch').value='';document.getElementById('searchResults').style.display='none';">${t.icon} ${t.name}</div>`).join('');
    if(!html) html=`<div style="padding:20px;text-align:center;">未找到与 "<strong>${q}</strong>" 相关的工具</div>`;
    document.getElementById('searchResults').innerHTML=html; document.getElementById('searchResults').style.display='block';
});
document.addEventListener('click',(e)=>{if(!e.target.closest('.search-container')) document.getElementById('searchResults').style.display='none';});

// Chat functionality (simplified)
(function(){ let chatPanel=document.getElementById('chatPanel'), chatButton=document.getElementById('chatButton'), chatClose=document.getElementById('chatCloseBtn'), chatInput=document.getElementById('chatInput'), chatSend=document.getElementById('chatSendBtn'), chatMessages=document.getElementById('chatMessages'); chatButton.addEventListener('click',()=>{ chatPanel.classList.toggle('active'); }); chatClose.addEventListener('click',()=>{ chatPanel.classList.remove('active'); }); chatSend.addEventListener('click',()=>{ let msg=chatInput.value.trim(); if(!msg)return; chatMessages.innerHTML+=`<div class="chat-message user">${msg}</div>`; chatInput.value=''; chatMessages.scrollTop=chatMessages.scrollHeight; setTimeout(()=>{ chatMessages.innerHTML+=`<div class="chat-message bot">🤖 收到: "${msg}"。试试输入 "计算器" 或 "pdf"。</div>`; chatMessages.scrollTop=chatMessages.scrollHeight; },500); }); chatInput.addEventListener('keypress',(e)=>{if(e.key==='Enter') chatSend.click();}); })();

// Override links
var originalWindowOpen=window.open; window.open=function(url,target,features){ if(url&&(url.startsWith('http://')||url.startsWith('https://'))){ window.location.href=url; return null;} return originalWindowOpen(url,target,features); };
document.addEventListener('click',function(e){ let target=e.target.closest('a'); if(target&&target.href){ if(!target.href.startsWith('http://')&&!target.href.startsWith('https://'))return; e.preventDefault(); window.location.href=target.href; } });
const base=document.createElement('base'); base.target='_self'; document.head.appendChild(base);

renderGrid(); renderSidebar(); selectTool('calculator');

const randomBtn=document.getElementById('randomToolBtn'); let isRandomVisible=true; setInterval(()=>{ if(randomBtn){ isRandomVisible?randomBtn.classList.add('hide-random'):randomBtn.classList.remove('hide-random'); isRandomVisible=!isRandomVisible; } },3000); randomBtn.addEventListener('click',function(){ let avail=tools.filter(t=>t.id!=='premium_ai'); let rand=avail[Math.floor(Math.random()*avail.length)]; if(rand){ selectTool(rand.id); playSound(); showToast(`🎲 随机工具: ${rand.name}`); } });
