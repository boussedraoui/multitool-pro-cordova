name: Build Signed APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g cordova
      - run: cordova create multitool-app com.multitool.proz "MultiTool Pro"
      - run: cp index.html multitool-app/www/index.html
      - run: cp config.xml multitool-app/config.xml
      - run: keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias my-alias -storepass 123456 -keypass 123456 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"
      - run: cd multitool-app && cordova platform add android@13.0.0
      - run: cd multitool-app && cordova build android --release -- --keystore ../my-release-key.jks --storePassword=123456 --alias=my-alias --password=123456
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: multitool-app/platforms/android/app/build/outputs/apk/release/*.apk
